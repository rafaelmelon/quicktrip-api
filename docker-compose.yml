services:
  postgres:
    image: postgres:17-alpine
    container_name: quicktrip-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: quicktrip
      POSTGRES_PASSWORD: quicktrip
      POSTGRES_DB: quicktrip
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
